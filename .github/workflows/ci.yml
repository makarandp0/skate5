name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @skate5/shared run build

      - name: Lint
        run: pnpm exec eslint packages/ --max-warnings=0

      - name: Typecheck
        run: pnpm --filter @skate5/api --filter @skate5/web --filter @skate5/shared run typecheck

      - name: Build
        run: pnpm --filter @skate5/api --filter @skate5/web --filter @skate5/shared run build
